version: "3.8"

services:
  omnipub:
    build: .
    container_name: omnipub
    ports:
      - "9527:9527"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./data:/app/data
      - ./backend/uploads:/app/backend/uploads
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9527/api/ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
