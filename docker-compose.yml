version: "3.8"

# OmniPublish V2.0 — 单机版（SQLite，无需 PostgreSQL）
# 使用方式: docker compose up -d
# 或直接运行: python backend/main.py（推荐单机使用）

services:
  omnipub:
    build: .
    container_name: omnipub
    ports:
      - "9527:9527"
    volumes:
      # 配置文件
      - ./config.json:/app/config.json:ro
      # SQLite 数据库持久化
      - ./data:/app/data
      # 上传/水印文件持久化
      - ./backend/uploads:/app/backend/uploads
      # 素材目录（本地 .env 设置 MATERIALS_DIR）
      - ${MATERIALS_DIR:-/tmp/omnipub_materials}:/mnt/materials
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9527/api/ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
