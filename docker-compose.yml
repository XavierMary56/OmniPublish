version: "3.8"

services:
  omnipub:
    build: .
    container_name: omnipub
    ports:
      - "9527:9527"
    volumes:
      # 配置文件 (热更新无需重建)
      - ./config.json:/app/config.json:ro
      # 上传/输出持久化
      - ./uploads:/app/uploads
      # 挂载本地素材目录 — 容器内可直接读取
      - D:/Users/Public/claude_ia:/mnt/素材:ro
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9527/api/ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
